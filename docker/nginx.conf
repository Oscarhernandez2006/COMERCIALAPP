user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 25M;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;

    server {
        listen 80 default_server;
        server_name _;

        # Raiz por defecto: el SPA compilado
        root /var/www/frontend;
        index index.html;

        # ---- API y rutas atendidas por Laravel ----
        location ^~ /api {
            root /var/www/backend/public;
            try_files $uri /index.php?$query_string;
        }

        location ^~ /sanctum {
            root /var/www/backend/public;
            try_files $uri /index.php?$query_string;
        }

        location ^~ /broadcasting {
            root /var/www/backend/public;
            try_files $uri /index.php?$query_string;
        }

        # ---- Archivos publicos / uploads de Laravel ----
        location ^~ /storage {
            root /var/www/backend/public;
            try_files $uri =404;
        }

        # ---- WebSocket de Reverb ----
        location ^~ /app {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ---- Handler PHP (Laravel) ----
        location ~ \.php$ {
            root /var/www/backend/public;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # ---- SPA: cualquier otra ruta cae al index.html de React ----
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
